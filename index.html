<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter: Deathmatch</title>
    <!-- Google Fonts: Orbitron -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Lobby Modal -->
    <div id="lobby-modal" class="modal active">
        <div class="modal-content">
            <h1>NEON<br>DEATHMATCH</h1>
            <p>Enter your name to join the 3-minute battle arena.</p>
            
            <div class="input-group">
                <input type="text" id="player-name-input" placeholder="Your Name..." maxlength="12">
            </div>

            <div id="lobby-status">
                Waiting for players... ( <span id="player-count">0</span> / 3 )
            </div>
            
            <button id="join-btn" class="neon-btn">JOIN GAME</button>
            <p id="player-assigned" class="hidden">Welcome, <span id="my-player-name-disp"></span>! You are <span id="my-player-num"></span></p>
            
            <div class="leaderboard-section">
                <h3>🏆 LEADERBOARD</h3>
                <ul id="leaderboard-list">
                    <li>Loading...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="game-wrapper">
        <header class="hud">
            <div class="hp-card p1">
                <span class="label" id="label-p1">P1 (RED)</span>
                <div class="stats-row">
                    <div class="hp-bar"><div class="hp-fill" id="hp-p1"></div></div>
                    <div class="kills" id="kills-p1">0 Kills</div>
                </div>
            </div>
            
            <div class="timer-display">
                <span id="time-left">03:00</span>
            </div>

            <div class="hp-card p2">
                <span class="label" id="label-p2">P2 (BLUE)</span>
                <div class="stats-row">
                    <div class="hp-bar"><div class="hp-fill" id="hp-p2"></div></div>
                    <div class="kills" id="kills-p2">0 Kills</div>
                </div>
            </div>
            <div class="hp-card p3">
                <span class="label" id="label-p3">P3 (YELLOW)</span>
                <div class="stats-row">
                    <div class="hp-bar"><div class="hp-fill" id="hp-p3"></div></div>
                    <div class="kills" id="kills-p3">0 Kills</div>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="game-canvas" width="800" height="600"></canvas>
        </main>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>TIME'S UP!</h2>
            <div id="winner-announcement">
                <h1 id="winner-text">Player X Wins!</h1>
                <p id="winner-stats-text">Total Wins: 0</p>
            </div>
            <button id="restart-btn" class="neon-btn">RETURN TO LOBBY</button>
        </div>
    </div>

    <!-- Firebase SDK v10 Modular via CDN (type="module") -->
    <script type="module" src="script.js"></script>
</body>
</html>
