<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter</title>
    <!-- Google Fonts: Orbitron -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Lobby Modal -->
    <div id="lobby-modal" class="modal active">
        <div class="modal-content">
            <h1>NEON<br>SHOOTER</h1>
            <p>Welcome to the ultimate space battle arena.</p>
            <div id="lobby-status">
                Waiting for players... ( <span id="player-count">0</span> / 3 )
            </div>
            <button id="join-btn" class="neon-btn">JOIN GAME</button>
            <p id="player-assigned" class="hidden">You are Player <span id="my-player-num"></span></p>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="game-wrapper">
        <header class="hud">
            <div class="hp-card p1">
                <span class="label">P1 (RED)</span>
                <div class="hp-bar"><div class="hp-fill" id="hp-p1"></div></div>
            </div>
            <div class="hp-card p2">
                <span class="label">P2 (BLUE)</span>
                <div class="hp-bar"><div class="hp-fill" id="hp-p2"></div></div>
            </div>
            <div class="hp-card p3">
                <span class="label">P3 (YELLOW)</span>
                <div class="hp-bar"><div class="hp-fill" id="hp-p3"></div></div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="game-canvas" width="800" height="600"></canvas>
        </main>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>GAME OVER</h2>
            <div id="winner-announcement">
                <h1 id="winner-text">Player X Wins!</h1>
            </div>
            <button id="restart-btn" class="neon-btn">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Firebase SDK v10 Modular via CDN (type="module") -->
    <script type="module" src="script.js"></script>
</body>
</html>
